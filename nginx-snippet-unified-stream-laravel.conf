# =============================================================================
# Bloc à mettre dans /etc/nginx/sites-enabled/tv.embmission.com
# pour que /hls/streams/unified.m3u8 soit servi par Laravel (PHP-FPM).
#
# Remplacer le bloc actuel "location = /hls/streams/unified.m3u8" (proxy_pass 8081)
# par le bloc ci-dessous. Voir docs/PLAN_EXECUTION_ROUTAGE_UNIFIED_LARAVEL.md.
# =============================================================================

    location = /hls/streams/unified.m3u8 {
        # Servi par Laravel (détection live/VoD et transitions correctes)
        rewrite ^/hls/streams/unified.m3u8$ /api/stream/unified.m3u8 break;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/emb-mission/public/index.php;
        fastcgi_param REQUEST_URI /api/stream/unified.m3u8;
        fastcgi_param QUERY_STRING $query_string;
    }
