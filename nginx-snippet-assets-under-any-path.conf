# ==========================================
# 🖼️ ASSETS FLUTTER sous n'importe quel chemin
# L'app Flutter peut être servie depuis /, /dashboard, /webtv, /settings, etc.
# Dans tous les cas, les images sont demandées en /<path>/assets/...
# Cette règle redirige tout .../assets/... vers le dossier public/assets/
# ==========================================
# À insérer AVANT le bloc "location /" (Flutter catch-all) dans les vhosts
# rtv.embmission.com et tv.embmission.com.
#
# Coller le bloc ci-dessous (sans le # au début des lignes) :

    location ~ ^/[^/]+/assets/(.*)$ {
        alias /var/www/emb-mission/public/assets/$1;
        add_header Cache-Control "public, max-age=86400";
    }
